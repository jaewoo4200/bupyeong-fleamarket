<!-- @dsCard group="Foundations" name="Radius & Elevation" subtitle="라운드·섀도 토큰" -->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Radius & Elevation</title>
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendard-dynamic-subset.min.css");
  :root {
    --cream-50:#fdfbf7; --ink-400:#978a7c; --ink-900:#2a2320;
    --shadow-soft:0 1px 2px rgba(42,35,32,.04),0 4px 16px rgba(42,35,32,.06);
    --shadow-card:0 2px 4px rgba(42,35,32,.05),0 12px 32px rgba(42,35,32,.08);
    --shadow-pop:0 8px 24px rgba(236,94,46,.18),0 2px 6px rgba(42,35,32,.08);
  }
  * { box-sizing:border-box; }
  body { font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif; background:var(--cream-50); color:var(--ink-900); margin:0; padding:28px; }
  h2 { font-size:13px; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-400); margin:0 0 14px; }
  .row { display:flex; flex-wrap:wrap; gap:20px; margin-bottom:28px; }
  .box { width:120px; height:80px; background:#fff; display:flex; align-items:flex-end; justify-content:center; padding:8px; font-size:11px; color:var(--ink-400); }
</style>
</head>
<body>
  <h2>Radius</h2>
  <div class="row">
    <div class="box" style="border-radius:.375rem;box-shadow:var(--shadow-soft)">sm · 6</div>
    <div class="box" style="border-radius:.625rem;box-shadow:var(--shadow-soft)">md · 10</div>
    <div class="box" style="border-radius:.875rem;box-shadow:var(--shadow-soft)">lg · 14</div>
    <div class="box" style="border-radius:1.25rem;box-shadow:var(--shadow-soft)">xl · 20</div>
    <div class="box" style="border-radius:1.75rem;box-shadow:var(--shadow-soft)">2xl · 28</div>
  </div>
  <h2>Elevation</h2>
  <div class="row">
    <div class="box" style="border-radius:1rem;box-shadow:var(--shadow-soft)">soft</div>
    <div class="box" style="border-radius:1rem;box-shadow:var(--shadow-card)">card</div>
    <div class="box" style="border-radius:1rem;box-shadow:var(--shadow-pop)">pop</div>
  </div>
</body>
</html>
