<!-- @dsCard group="Foundations" name="Colors" subtitle="브랜드·뉴트럴·상태·카테고리·벤치" -->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Colors</title>
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendard-dynamic-subset.min.css");
  :root {
    --cream-50:#fdfbf7; --cream-100:#f8f3ea; --cream-200:#efe7d7; --cream-300:#e2d5bf; --sand-400:#cdba9c;
    --ink-300:#b4a89b; --ink-400:#978a7c; --ink-500:#756a5e; --ink-700:#4a4039; --ink-900:#2a2320;
    --coral-50:#fff3ee; --coral-100:#ffe2d6; --coral-200:#ffc4ad; --coral-300:#ff9e7a; --coral-400:#f77a4f; --coral-500:#ec5e2e; --coral-600:#d8481c; --coral-700:#b33a14;
    --teal-50:#e9f8f4; --teal-100:#c9efe6; --teal-300:#5fccb4; --teal-400:#2bb89e; --teal-500:#149e84; --teal-600:#0e7e69;
    --gold-400:#e9b949; --gold-500:#d99e2b; --rose-500:#e5484d;
  }
  * { box-sizing: border-box; }
  body { font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif; background:var(--cream-50); color:var(--ink-900); margin:0; padding:28px; }
  h2 { font-size:13px; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-400); margin:22px 0 12px; }
  h2:first-of-type { margin-top:0; }
  .row { display:flex; flex-wrap:wrap; gap:10px; }
  .sw { width:96px; }
  .chip { height:52px; border-radius:10px; border:1px solid rgba(42,35,32,.06); }
  .nm { font-size:11px; font-weight:600; margin-top:6px; }
  .hx { font-size:10px; color:var(--ink-400); font-variant-numeric:tabular-nums; }
  .cat { display:flex; align-items:center; gap:8px; width:160px; font-size:12px; }
  .dot { width:16px; height:16px; border-radius:5px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:8px; max-width:720px; }
</style>
</head>
<body>
  <h2>Primary · Coral (테라코타)</h2>
  <div class="row" id="coral"></div>
  <h2>Accent · Teal</h2>
  <div class="row" id="teal"></div>
  <h2>Neutral · Cream / Ink</h2>
  <div class="row" id="neutral"></div>
  <h2>Status</h2>
  <div class="row" id="status"></div>
  <h2>Bench (좌석 박스색)</h2>
  <div class="row" id="bench"></div>
  <h2>취급상품 카테고리 (14)</h2>
  <div class="grid" id="cat"></div>

<script>
  const swatch = (name, hex) => `<div class="sw"><div class="chip" style="background:${hex}"></div><div class="nm">${name}</div><div class="hx">${hex}</div></div>`;
  const sets = {
    coral: [["50","#fff3ee"],["100","#ffe2d6"],["300","#ff9e7a"],["400","#f77a4f"],["500 ●","#ec5e2e"],["600","#d8481c"],["700","#b33a14"]],
    teal: [["50","#e9f8f4"],["100","#c9efe6"],["400","#2bb89e"],["500 ●","#149e84"],["600","#0e7e69"]],
    neutral: [["cream-50","#fdfbf7"],["cream-100","#f8f3ea"],["cream-200","#efe7d7"],["cream-300","#e2d5bf"],["ink-400","#978a7c"],["ink-500","#756a5e"],["ink-700","#4a4039"],["ink-900","#2a2320"]],
    status: [["gold-400","#e9b949"],["gold-500","#d99e2b"],["rose-500","#e5484d"]],
    bench: [["벤치 있음 (red)","#ff0000"],["의자 지급 (blue)","#00b0f0"]],
  };
  for (const [id, arr] of Object.entries(sets)) document.getElementById(id).innerHTML = arr.map(([n,h])=>swatch(n,h)).join("");
  const cats = [["보석·액세서리","#E86CA6"],["문구·공예품","#4C8DD6"],["패브릭아트","#21A6A6"],["향수·비누","#9B59B6"],["식품·음료","#E0533D"],["동물용품","#F2913D"],["식물·정원","#4CAF6E"],["시각예술","#6C5CE7"],["목공예","#A9744F"],["세라믹·도자기","#C8794B"],["가죽공예","#7A5230"],["유리공예","#3FB8D6"],["재활용예술","#8AA63B"],["기타","#9AA0A6"]];
  document.getElementById("cat").innerHTML = cats.map(([n,h])=>`<div class="cat"><span class="dot" style="background:${h}"></span>${n} <span class="hx">${h}</span></div>`).join("");
</script>
</body>
</html>
