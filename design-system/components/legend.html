<!-- @dsCard group="Components" name="Legend" subtitle="자리 상태 · 카테고리" -->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Legend</title>
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendard-dynamic-subset.min.css");
  :root { --cream-50:#fdfbf7; --cream-200:#efe7d7; --cream-300:#e2d5bf; --ink-400:#978a7c; --ink-500:#756a5e; --ink-700:#4a4039; --coral-400:#f77a4f; }
  * { box-sizing:border-box; }
  body { font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif; background:var(--cream-50); margin:0; padding:28px; color:var(--ink-500); }
  h2 { font-size:13px; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-400); margin:0 0 12px; }
  .row { display:flex; flex-wrap:wrap; gap:16px; font-size:13px; align-items:center; }
  .it { display:inline-flex; align-items:center; gap:6px; }
  .sq { width:14px; height:14px; border-radius:4px; }
  .box { position:relative; width:14px; height:14px; border-radius:4px; border:1px solid var(--cream-300); background:#fff; }
  .wood::before { content:""; position:absolute; inset:0 0 auto 0; height:3px; border-radius:4px 4px 0 0; background:#A9744F; }
  .dot { width:10px; height:10px; border-radius:9999px; }
  .grid { display:flex; flex-wrap:wrap; gap:10px 14px; font-size:12px; }
  .cat { display:inline-flex; align-items:center; gap:6px; }
</style>
</head>
<body>
  <h2>자리 상태</h2>
  <div class="row">
    <span class="it"><span class="box"></span> 빈자리</span>
    <span class="it"><span class="sq" style="background:var(--coral-400)"></span> 배정됨</span>
    <span class="it"><span class="box wood"></span> 나무매대</span>
    <span class="it"><span class="dot" style="background:#ff0000"></span> 의자 비치(벤치)</span>
    <span class="it"><span class="dot" style="background:#00b0f0"></span> 의자 지급 필요</span>
  </div>
  <h2 style="margin-top:24px">취급상품 카테고리</h2>
  <div class="grid" id="cat"></div>
<script>
  const cats=[["보석·액세서리","#E86CA6"],["문구·공예품","#4C8DD6"],["패브릭아트","#21A6A6"],["향수·비누","#9B59B6"],["식품·음료","#E0533D"],["동물용품","#F2913D"],["식물·정원","#4CAF6E"],["시각예술","#6C5CE7"],["목공예","#A9744F"],["세라믹·도자기","#C8794B"],["가죽공예","#7A5230"],["유리공예","#3FB8D6"],["재활용예술","#8AA63B"],["기타","#9AA0A6"]];
  document.getElementById("cat").innerHTML=cats.map(([n,h])=>`<span class="cat"><span class="dot" style="background:${h}"></span>${n}</span>`).join("");
</script>
</body>
</html>
