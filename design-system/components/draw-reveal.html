<!-- @dsCard group="Venue" name="Draw reveal" subtitle="추첨 결과 카드" -->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Draw reveal</title>
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendard-dynamic-subset.min.css");
  :root { --cream-50:#fdfbf7; --cream-100:#f8f3ea; --ink-400:#978a7c; --ink-700:#4a4039; --ink-900:#2a2320; --coral-500:#ec5e2e; --shadow-pop:0 8px 24px rgba(236,94,46,.18),0 2px 6px rgba(42,35,32,.08); }
  * { box-sizing:border-box; }
  body { font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif; background:var(--cream-50); color:var(--ink-900); margin:0; padding:36px; display:flex; flex-direction:column; align-items:center; }
  .tile { width:170px; height:170px; border-radius:28px; background:#E86CA6; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:var(--shadow-pop); }
  .tile small { font-size:13px; opacity:.9; font-weight:600; }
  .tile .n { font-size:40px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1; padding:0 8px; text-align:center; }
  h2 { font-size:24px; font-weight:800; margin:22px 0 2px; }
  .sub { color:var(--ink-400); margin:0; }
  .dir { margin-top:16px; background:var(--cream-100); color:var(--ink-700); border-radius:12px; padding:10px 16px; font-size:14px; font-weight:500; }
  .next { margin-top:24px; background:var(--coral-500); color:#fff; border:0; border-radius:10px; height:48px; padding:0 24px; font-size:16px; font-weight:600; display:inline-flex; align-items:center; gap:8px; }
</style>
</head>
<body>
  <div class="tile"><small>배정 좌석</small><div class="n">34, 34-1</div></div>
  <h2>만달</h2>
  <p class="sub">김지은 · 보석·액세서리</p>
  <div class="dir">📍 아랫구간 · 미도인 매장 앞 · 중앙무대 왼쪽 방향 (34,34-1번)</div>
  <button class="next">다음 셀러 →</button>
</body>
</html>
