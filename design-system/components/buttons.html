<!-- @dsCard group="Components" name="Buttons" subtitle="6 variant × 4 size" -->
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Buttons</title>
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendard-dynamic-subset.min.css");
  :root {
    --cream-50:#fdfbf7; --cream-100:#f8f3ea; --cream-300:#e2d5bf; --ink-400:#978a7c; --ink-700:#4a4039; --ink-900:#2a2320;
    --coral-500:#ec5e2e; --coral-600:#d8481c; --teal-500:#149e84; --teal-600:#0e7e69; --rose-500:#e5484d;
    --shadow-soft:0 1px 2px rgba(42,35,32,.04),0 4px 16px rgba(42,35,32,.06);
  }
  * { box-sizing:border-box; }
  body { font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif; background:var(--cream-50); color:var(--ink-900); margin:0; padding:28px; }
  table { border-collapse:separate; border-spacing:14px; }
  th { font-size:11px; color:var(--ink-400); font-weight:600; text-align:left; }
  td.lbl { font-size:12px; color:var(--ink-700); font-weight:700; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; border:0; border-radius:.625rem; font-weight:600; cursor:pointer; white-space:nowrap; }
  .sm { height:32px; padding:0 12px; font-size:12px; } .md { height:40px; padding:0 16px; font-size:14px; } .lg { height:48px; padding:0 24px; font-size:16px; }
  .primary { background:var(--coral-500); color:#fff; box-shadow:var(--shadow-soft); }
  .secondary { background:var(--ink-900); color:var(--cream-50); }
  .accent { background:var(--teal-500); color:#fff; }
  .outline { background:#fff; color:var(--ink-900); border:1px solid var(--cream-300); }
  .ghost { background:transparent; color:var(--ink-700); }
  .danger { background:var(--rose-500); color:#fff; }
</style>
</head>
<body>
  <table>
    <tr><th></th><th>sm</th><th>md</th><th>lg</th></tr>
    <script>
      const variants = ["primary","secondary","accent","outline","ghost","danger"];
      const sizes = ["sm","md","lg"];
      document.write(variants.map(v => `<tr><td class="lbl">${v}</td>` + sizes.map(s => `<td><button class="btn ${v} ${s}">자리 뽑기</button></td>`).join("") + `</tr>`).join(""));
    </script>
  </table>
</body>
</html>
